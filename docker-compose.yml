services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      VITE_SERVER_URL: ${VITE_SERVER_URL:-http://localhost:3000}
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:password@postgres:5432/trator
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-HBobso8FtiaCtNzcePQlvedc40xnuuZx}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres
    container_name: trator-postgres
    environment:
      POSTGRES_DB: trator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - trator_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trator"]
      interval: 1s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  trator_postgres_data:
