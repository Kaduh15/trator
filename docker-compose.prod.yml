services:
  web:
    build:
      target: prod
    ports:
      - "8080:80"
    environment:
      NODE_ENV: production
      VITE_SERVER_URL: ${VITE_SERVER_URL:-http://localhost:3000}

  server:
    build:
      target: prod
    environment:
      NODE_ENV: production
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-HBobso8FtiaCtNzcePQlvedc40xnuuZx}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
